<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Video Final</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita que surtin barres de scroll */
            background-color: black; /* Fons negre per a una experiència de cine */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            /* 'cover' fa que ompli tota la pantalla, 'contain' fa que es vegi tot el vídeo sense retallar */
            object-fit: contain; 
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none; /* Permet fer clic al vídeo a través del text */
        }

        h1 {
            color: white;
            font-family: sans-serif;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin: 0;
            font-size: 3rem;
        }

        .btn-back {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            background-color: rgba(39, 174, 96, 0.8); /* Verda semi-transparent */
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            transition: all 0.3s;
            text-decoration: none;
            font-family: sans-serif;
            pointer-events: auto; /* Perquè el botó sí que es pugui clicar */
        }

        .btn-back:hover {
            background-color: #27ae60;
            transform: translateX(-50%) scale(1.1);
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div class="ui-overlay">
            <h1>¡Has escapat!</h1>
        </div>

        <video controls autoplay>
            <source src="images/Video Final.mp4" type="video/mp4">
            Tu navegador no soporta el vídeo.
        </video>

        <a href="index.html" class="btn-back">⬅ Volver al Juego</a>
    </div>

</body>
</html>
