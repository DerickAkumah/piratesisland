<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Adventure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Animació del Menú */
        @keyframes flotarMenu {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* NOVA ANIMACIÓ PER A L'ULL (Moviment circular suau) */
        @keyframes flotarUll {
            0% { transform: translate(0, 0); }
            25% { transform: translate(10px, 10px); }
            50% { transform: translate(0, 20px); }
            75% { transform: translate(-10px, 10px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url("images/fonsO1.gif");
            background-size: cover;
            background-position: center;
            background-color: #1a2a1f;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            cursor: url('https://cdn.cursors-4u.net/css-previews/freaky-purple-eye-9e2d4900-css.webp'), auto !important;
        }

        .game-wrapper {
            position: relative;
            width: 1000px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- L'ULL AMB ANIMACIÓ --- */
        .corner-image {
            position: absolute;
            top: 80px;
            right: 100px;
            width: 150px;
            height: 150px;
            background-image: url("images/ull.png");
            background-size: cover;
            image-rendering: pixelated;
            z-index: 10;

            /* APLICACIÓ DEL MOVIMENT DE L'ULL */
            animation: flotarUll 5s ease-in-out infinite;
            will-change: transform;
        }
  .corner-image {
            position: absolute;
            top: 0px;
            right: 100px;
            width: 150px;
            height: 150px;
            background-image: url("images/ull.png");
            background-size: cover;
            image-rendering: pixelated;
            z-index: 10;

            /* APLICACIÓ DEL MOVIMENT DE L'ULL */
            animation: flotarUll 5s ease-in-out infinite;
            will-change: transform;
        }
        .screen {
            text-align: center;
            padding: 50px;
            background: rgba(0, 0, 0, 0.85);
            border: 4px solid #ffffff;
            outline: 4px solid #2ecc71;
            outline-offset: -12px;
            box-shadow: 0 0 0 8px rgba(0,0,0,0.5);
            max-width: 600px;
            animation: flotarMenu 4s ease-in-out infinite;
            will-change: transform;
            position: relative;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            line-height: 1.4;
            text-shadow: 4px 4px #27ae60;
        }

        p {
            color: #2ecc71;
            font-size: 0.8rem;
            margin-bottom: 50px;
            animation: flash 1.5s infinite;
        }

        button {
            padding: 20px 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: url('https://cdn.cursors-4u.net/css-previews/freaky-purple-eye-9e2d4900-css.webp'), auto !important;
            background-color: #27ae60;
            color: white;
            border: none;
            box-shadow: 0 8px 0 #1e8449, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.1s;
            position: relative;
            outline: none;
        }

        button:hover {
            background-color: #2ecc71;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #27ae60, 0 20px 25px rgba(0,0,0,0.6);
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1e8449;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="corner-image"></div>

        <div class="screen">
            <h1>ISLAND ADVENTURE</h1>
            <p>Akumah's Version</p>
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>

    <script>
    function startGame(){
        // Això t'enviarà a index.html
        window.location.href = "index.html";
    }
    </script>

</body>
</html>
