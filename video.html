<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Video Especial</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2ecc71; /* Verde claro */
            font-family: sans-serif;
        }
        .screen {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 800px;
        }
        video {
            width: 100%;
            border-radius: 10px;
            border: 5px solid #27ae60;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #27ae60; /* Verde oscuro */
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        button:hover { background-color: #1e8449; }
    </style>
</head>
<body>
    <div class="screen">
        <h1>¡Has encontrado a Goku!</h1>
        <video controls autoplay>
            <source src="images/Akumah y Goku.mp4" type="video/mp4">
            Tu navegador no soporta el vídeo.
        </video>
        <br>
        <button onclick="window.location.href='index.html'">⬅ Volver al Juego</button>
    </div>
</body>
</html>
